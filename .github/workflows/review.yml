name: Review

on:
  pull_request:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Prettier
        run: npx prettier --ignore-unknown --check .
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
